<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Smart Campus Navigation — Login to access campus maps and building details." />
  <title>Login — Smart Campus Navigation</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- LOGIN PAGE -->
  <div class="login-wrapper">
    <div class="login-box">

      <h1 class="login-title">Smart Campus</h1>
      <p class="login-subtitle">Sign in to access campus navigation</p>

      <!-- Error message (hidden by default) -->
      <div id="login-error" class="login-error"></div>

      <!-- Login Form -->
      <form id="login-form">

        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter username"
          autocomplete="username"
          required
        />

        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter password"
          autocomplete="current-password"
          required
        />

        <button type="submit" class="btn" id="login-btn">Login</button>

      </form>

      <p style="margin-top: 18px; font-size: 0.82rem; color: #888; text-align: center;">
        Use &nbsp;<strong>admin</strong>&nbsp;/&nbsp;<strong>1234</strong>&nbsp; to log in.
      </p>

    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
